<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CO2 Station</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eeeeee;
      --panel: #ffffff;
      --border: #9a9a9a;
      --grid: #d9d9d9;
      --ink: #111111;
      --muted: #555555;
      --co2: #1f4aa8;
      --temp: #8f4b18;
      --rh: #0c6a4b;
      --pressure: #5a4a8f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.4;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }

    h1, h2, p {
      margin: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 12px;
      margin-bottom: 12px;
    }

    .title-row {
      margin-bottom: 12px;
    }

    .title-row h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .title-row p {
      color: var(--muted);
      font-size: 0.92rem;
      max-width: 42rem;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    select, button {
      font: inherit;
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 8px 10px;
      background: #ffffff;
      color: var(--ink);
    }

    button {
      color: var(--ink);
      cursor: pointer;
      min-width: 110px;
    }

    .status {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 10px;
    }

    .stat h2 {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 400;
    }

    .stat p {
      font-family: "Courier New", Courier, monospace;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 12px;
    }

    .chart-card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 12px;
    }

    .chart-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .chart-head h2 {
      font-size: 1rem;
      margin-bottom: 2px;
    }

    .chart-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .chart-latest {
      font-family: "Courier New", Courier, monospace;
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 8px;
      align-items: stretch;
    }

    .axis-note {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .y-axis {
      display: grid;
      grid-template-rows: auto 1fr auto 1fr auto;
      align-items: center;
      text-align: right;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .y-axis strong {
      font-size: 0.78rem;
      color: var(--ink);
      font-weight: 700;
    }

    .plot-shell {
      border: 1px solid var(--border);
      background: #fcfcfc;
      padding: 6px;
    }

    .plot-shell svg {
      width: 100%;
      height: 180px;
      display: block;
    }

    .x-axis {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 8px;
      padding-left: 78px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .x-axis strong {
      color: var(--ink);
      font-weight: 700;
    }

    .empty {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }
    @media (max-width: 720px) {
      main {
        padding: 12px;
      }

      .chart-grid {
        grid-template-columns: 56px 1fr;
      }

      .x-axis {
        padding-left: 64px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="title-row">
      <h1>CO2 Station</h1>
      <p>Minimal dashboard for inspecting sensor uploads.</p>
    </section>

    <section class="panel controls">
      <div class="control-row">
        <label for="windowSelect" style="color: var(--muted); font-size: 0.88rem;">
          Range
        </label>
        <select id="windowSelect">
          <option value="month">Last 30 days</option>
          <option value="week">Last 7 days</option>
          <option value="day">Last 24 hours</option>
        </select>
        <button id="loadButton" type="button">Reload data</button>
      </div>
      <div class="status" id="statusLine">Status: waiting for a request.</div>
    </section>

    <section class="stats" id="stats"></section>
    <section class="charts" id="charts"></section>
  </main>

  <script>
    const loadButton = document.getElementById("loadButton");
    const windowSelect = document.getElementById("windowSelect");
    const statusLine = document.getElementById("statusLine");
    const statsContainer = document.getElementById("stats");
    const chartsContainer = document.getElementById("charts");

    const chartDefinitions = [
      { key: "co2", label: "CO2", unit: "ppm", color: "#1d4ed8" },
      { key: "temp", label: "Temperature", unit: "C", color: "#b45309" },
      { key: "rh", label: "Humidity", unit: "%", color: "#047857" },
      { key: "pressure", label: "Pressure", unit: "hPa", color: "#7c3aed" }
    ];

    loadButton.addEventListener("click", loadData);
    windowSelect.addEventListener("change", loadData);
    renderEmpty("Loading readings...");
    loadData();

    async function loadData() {
      setStatus("Loading readings...");

      try {
        const response = await fetch("/records");

        if (!response.ok) {
          throw new Error("API returned HTTP " + response.status);
        }

        let rows = await response.json();
        if (!Array.isArray(rows)) {
          rows = [];
        }

        rows = filterRowsForWindow(rows, windowSelect.value);
        renderDashboard(rows);
        setStatus("Loaded " + rows.length + " readings.");
      } catch (error) {
        renderEmpty("Could not load data right now.");
        statsContainer.innerHTML = "";
        setStatus(error.message);
      }
    }

    function filterRowsForWindow(rows, windowValue) {
      const cutoffMs = {
        day: 24 * 60 * 60 * 1000,
        week: 7 * 24 * 60 * 60 * 1000,
        month: 30 * 24 * 60 * 60 * 1000
      }[windowValue] || (30 * 24 * 60 * 60 * 1000);

      const cutoff = Date.now() - cutoffMs;
      return rows.filter((row) => Date.parse(row.timestamp) >= cutoff);
    }

    function renderDashboard(rows) {
      if (!rows.length) {
        renderEmpty("No readings found for that time window yet.");
        statsContainer.innerHTML = "";
        return;
      }

      const latest = rows[rows.length - 1];
      statsContainer.innerHTML = [
        renderStat("Latest CO2", formatValue(latest.co2, "ppm")),
        renderStat("Temperature", formatValue(latest.temp, "C")),
        renderStat("Humidity", formatValue(latest.rh, "%")),
        renderStat("Pressure", latest.pressure ? formatValue(latest.pressure, "hPa") : "n/a"),
        renderStat("Samples", String(rows.length)),
        renderStat("Latest reading", formatTimestamp(latest.timestamp))
      ].join("");

      chartsContainer.innerHTML = chartDefinitions.map((definition) => {
        const points = rows
          .map((row) => ({ time: Date.parse(row.timestamp), value: Number(row[definition.key]) }))
          .filter((point) => Number.isFinite(point.value))
          .filter((point) => definition.key !== "pressure" || point.value > 0);

        return renderChartCard(definition, points);
      }).join("");
    }

    function renderStat(label, value) {
      return `
        <article class="stat">
          <h2>${escapeHtml(label)}</h2>
          <p>${escapeHtml(value)}</p>
        </article>
      `;
    }

    function renderChartCard(definition, points) {
      if (!points.length) {
        return `
          <article class="chart-card">
            <div class="chart-head">
              <div>
                <h2>${escapeHtml(definition.label)}</h2>
                <div class="chart-subtitle">No data in this window</div>
              </div>
            </div>
            <div class="empty">Waiting for readings.</div>
          </article>
        `;
      }

      const values = points.map((point) => point.value);
      const latest = points[points.length - 1];
      const min = Math.min(...values);
      const max = Math.max(...values);
      const mid = (min + max) / 2;
      const path = buildPath(points);

      return `
        <article class="chart-card">
          <div class="chart-head">
            <div>
              <h2>${escapeHtml(definition.label)}</h2>
                <div class="chart-subtitle">${escapeHtml(definition.label)} versus time</div>
              </div>
              <div class="chart-latest">${escapeHtml(formatValue(latest.value, definition.unit))}</div>
            </div>

          <div class="axis-note">Y axis: ${escapeHtml(definition.label)} (${escapeHtml(definition.unit)})</div>
          <div class="chart-grid">
            <div class="y-axis">
              <strong>${escapeHtml(formatValue(max, definition.unit))}</strong>
              <span></span>
              <strong>${escapeHtml(formatValue(mid, definition.unit))}</strong>
              <span></span>
              <strong>${escapeHtml(formatValue(min, definition.unit))}</strong>
            </div>
            <div class="plot-shell">
              <svg viewBox="0 0 320 180" preserveAspectRatio="none" aria-label="${escapeHtml(definition.label)} chart">
                <line x1="0" y1="160" x2="320" y2="160" stroke="#b8b8b8" stroke-width="1" />
                <line x1="0" y1="80" x2="320" y2="80" stroke="#d9d9d9" stroke-width="1" />
                <line x1="0" y1="0" x2="320" y2="0" stroke="#d9d9d9" stroke-width="1" />
                <path d="${path.area}" fill="${definition.color}22"></path>
                <path d="${path.line}" fill="none" stroke="${definition.color}" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"></path>
              </svg>
            </div>
          </div>

          <div class="x-axis">
            <span><strong>Start:</strong> ${escapeHtml(formatTimestamp(points[0].time))}</span>
            <span><strong>Latest:</strong> ${escapeHtml(formatTimestamp(latest.time))}</span>
          </div>
          <div class="axis-note">X axis: time across the selected window.</div>
        </article>
      `;
    }

    function buildPath(points) {
      const width = 320;
      const height = 160;
      const values = points.map((point) => point.value);
      const times = points.map((point) => point.time);
      const minValue = Math.min(...values);
      const maxValue = Math.max(...values);
      const minTime = Math.min(...times);
      const maxTime = Math.max(...times);
      const valueRange = maxValue - minValue || 1;
      const timeRange = maxTime - minTime || 1;

      const coords = points.map((point) => {
        const x = ((point.time - minTime) / timeRange) * width;
        const y = height - (((point.value - minValue) / valueRange) * height);
        return [Number(x.toFixed(2)), Number(y.toFixed(2))];
      });

      const line = coords.map(([x, y], index) => `${index === 0 ? "M" : "L"} ${x} ${y}`).join(" ");
      const area = `${line} L ${width} ${height} L 0 ${height} Z`;

      return { line, area };
    }

    function renderEmpty(message) {
      chartsContainer.innerHTML = `<article class="empty">${escapeHtml(message)}</article>`;
    }

    function setStatus(message) {
      statusLine.textContent = "Status: " + message;
    }

    function formatValue(value, unit) {
      if (!Number.isFinite(value)) {
        return "n/a";
      }

      const digits = value >= 100 ? 0 : 1;
      return `${value.toFixed(digits)} ${unit}`;
    }

    function formatTimestamp(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleString(undefined, {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
